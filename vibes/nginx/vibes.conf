# /etc/nginx/sites-available/vibes
# Replace vibes.yourdomain.com with your actual domain

server {
    listen 80;
    server_name vibes.yourdomain.com;

    # Redirect HTTP → HTTPS (certbot adds this automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vibes.yourdomain.com;

    # SSL — managed by Let's Encrypt / certbot
    ssl_certificate     /etc/letsencrypt/live/vibes.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibes.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Serve React frontend (built static files)
    root /var/www/vibes/frontend/dist;
    index index.html;

    # API requests → Node.js backend (port 4000)
    location /api/ {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 15M;
    }

    # React SPA — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
